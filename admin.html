<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <!-- Firebase INITIALISIEREN -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD8dM3SYRmHI52aJnOIVLCkfbHAmM5h678",
      authDomain: "bike-kurse.firebaseapp.com",
      projectId: "bike-kurse",
      storageBucket: "bike-kurse.firebasestorage.app",
      messagingSenderId: "581675622978",
      appId: "1:581675622978:web:9e0c051d13f5a1581083db",
      measurementId: "G-PYMPVZ3753"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Admin-Schutz
    firebase.auth().onAuthStateChanged(user => {
      if (!user && localStorage.getItem("adminLoggedIn") !== "true") {
        window.location.href = "login.html";
      }
    });
  </script>

  <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="admin-container">

  <aside class="sidebar">
    <h2>Admin</h2>
    <nav>
      <button class="nav-btn" onclick="scrollToSection('create')">Kurs erstellen</button>
      <button class="nav-btn" onclick="scrollToSection('edit')">Kurs bearbeiten</button>
      <button class="nav-btn" onclick="scrollToSection('times')">Zeiten sperren</button>
      <button class="nav-btn" onclick="scrollToSection('bookings')">Buchungen</button>
    </nav>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </aside>

  <main class="content">

    <!-- KURS ERSTELLEN -->
    <section id="create" class="card">
      <h2>Neuen Kurs erstellen</h2>

      <label>Kurs-ID</label>
      <input id="newCourseId">

      <label>Titel</label>
      <input id="newCourseTitle">

      <label>Label im Formular</label>
      <input id="newCourseLabel">

      <label>Formular-Wert</label>
      <input id="newCourseFormValue">

      <label>Beschreibung</label>
      <textarea id="newCourseDescription"></textarea>

      <label>Preis</label>
      <input id="newCoursePrice" type="number">

      <label>Tag (1 = Montag, 4 = Donnerstag)</label>
      <input id="newCourseDay" type="number">

      <label>Zeiten (kommagetrennt)</label>
      <input id="newCourseTimes">

      <button id="createCourse" class="btn primary">Kurs erstellen</button>
    </section>

    <!-- KURS BEARBEITEN -->
    <section id="edit" class="card">
      <h2>Kurs bearbeiten</h2>

      <label>Kurs auswählen</label>
      <select id="courseSelect">
        <option value="">Bitte auswählen…</option>
      </select>

      <label>Titel</label>
      <input id="courseTitle">

      <label>Label im Formular</label>
      <input id="courseLabel">

      <label>Formular-Wert</label>
      <input id="courseFormValue">

      <label>Beschreibung</label>
      <textarea id="courseDescription"></textarea>

      <label>Preis</label>
      <input id="coursePrice" type="number">

      <label>Tag</label>
      <input id="courseDay" type="number">

      <label>Zeiten</label>
      <input id="courseTimes">

      <div class="btn-row">
        <button id="saveCourse" class="btn primary">Speichern</button>
        <button id="deleteCourse" class="btn danger">Löschen</button>
      </div>
    </section>

    <!-- ZEITEN SPERREN -->
    <section id="times" class="card">
      <h2>Zeit-Sperrungen</h2>

      <label>Datum auswählen</label>
      <input id="adminDate" type="date">

      <h3>Verfügbare Zeiten</h3>
      <div id="timeList" class="time-grid"></div>

      <h3>Gesperrte Zeiten</h3>
      <ul id="blockedList"></ul>

      <button id="clearAll" class="btn danger">Alle Sperrungen löschen</button>
    </section>

    <!-- BUCHUNGSÜBERSICHT -->
    <section id="bookings" class="card">
      <h2>Buchungsübersicht</h2>

      <label>Datum filtern</label>
      <input id="bookingDateFilter" type="date">

      <ul id="bookingList"></ul>
    </section>

  </main>

</div>

<script>
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}
</script>

<script src="admin.js"></script>

</body>
</html>
