<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "DEIN_API_KEY",
      authDomain: "DEIN_PROJECT.firebaseapp.com",
      projectId: "DEIN_PROJECT"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Admin-Schutz
    if (localStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="section">
  <h1>Admin Dashboard</h1>
  <p>Verwalte Kurse und Buchungszeiten.</p>
  <button id="logoutBtn" class="btn danger">Logout</button>
</header>

<section class="section">
  <h2>Neuen Kurs erstellen</h2>

  <div class="booking-form">

    <label>Kurs-ID (z.B. kinder, erwachsene)</label>
    <input id="newCourseId">

    <label>Titel</label>
    <input id="newCourseTitle">

    <label>Label im Formular</label>
    <input id="newCourseLabel">

    <label>Formular-Wert</label>
    <input id="newCourseFormValue">

    <label>Beschreibung</label>
    <textarea id="newCourseDescription"></textarea>

    <label>Preis</label>
    <input id="newCoursePrice" type="number">

    <label>Tag (1 = Montag, 4 = Donnerstag)</label>
    <input id="newCourseDay" type="number">

    <label>Zeiten (kommagetrennt)</label>
    <input id="newCourseTimes">

    <button id="createCourse" class="btn primary">Kurs erstellen</button>
  </div>
</section>

<section class="section">
  <h2>Kurs bearbeiten</h2>

  <div class="booking-form">

    <label>Kurs auswählen</label>
    <select id="courseSelect">
      <option value="">Bitte auswählen…</option>
    </select>

    <label>Titel</label>
    <input id="courseTitle">

    <label>Label im Formular</label>
    <input id="courseLabel">

    <label>Formular-Wert</label>
    <input id="courseFormValue">

    <label>Beschreibung</label>
    <textarea id="courseDescription"></textarea>

    <label>Preis</label>
    <input id="coursePrice" type="number">

    <label>Tag</label>
    <input id="courseDay" type="number">

    <label>Zeiten</label>
    <input id="courseTimes">

    <button id="saveCourse" class="btn primary">Kurs speichern</button>
    <button id="deleteCourse" class="btn danger">Kurs löschen</button>
  </div>
</section>

<section class="section">
  <h2>Zeit-Sperrungen</h2>

  <label>Datum auswählen</label>
  <input id="adminDate" type="date">

  <h3>Zeiten</h3>
  <div id="timeList"></div>

  <h3>Gesperrte Zeiten</h3>
  <ul id="blockedList"></ul>

  <button id="clearAll" class="btn danger">Alle Sperrungen löschen</button>
</section>

<script src="admin.js"></script>

</body>
</html>
