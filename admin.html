<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Fahrradkurse Saarland</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD8dM3SYRmHI52aJnOIVLCkfbHAmM5h678",
      authDomain: "bike-kurse.firebaseapp.com",
      projectId: "bike-kurse",
      storageBucket: "bike-kurse.firebasestorage.app",
      messagingSenderId: "581675622978",
      appId: "1:581675622978:web:9e0c051d13f5a1581083db",
      measurementId: "G-PYMPVZ3753"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
  </script>

  <link rel="stylesheet" href="style.css?v=2001">
</head>

<body>

<script>
  if (localStorage.getItem("adminLoggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>

<section class="section">
  <h2>Admin Dashboard</h2>
  <p class="section-subtitle">Verwalte Inhalte, Kurse, Bilder und Buchungszeiten.</p>

  <div class="contact-wrapper">

    <!-- STARTSEITE -->
    <div class="booking-form">
      <h3>Startseite bearbeiten</h3>

      <label>Hero Titel</label>
      <input id="heroTitle">

      <label>Hero Untertitel</label>
      <input id="heroSubtitle">

      <label>SEO‑Text</label>
      <textarea id="seoText" rows="5"></textarea>

      <button id="saveHomepage" class="btn primary" style="margin-top:12px;">
        Startseite speichern
      </button>
    </div>

    <!-- KURS-ERSTELLUNG -->
    <div class="booking-form">
      <h3>Neuen Kurs erstellen</h3>

      <label>Kurs-ID (z.B. kinder, erwachsene)</label>
      <input id="newCourseId">

      <label>Titel</label>
      <input id="newCourseTitle">

      <label>Label im Formular</label>
      <input id="newCourseLabel">

      <label>Formular-Wert</label>
      <input id="newCourseFormValue">

      <label>Beschreibung</label>
      <textarea id="newCourseDescription"></textarea>

      <label>Preis</label>
      <input id="newCoursePrice">

      <label>Tag (1 = Montag, 4 = Donnerstag)</label>
      <input id="newCourseDay" type="number" min="1" max="7">

      <label>Zeiten (kommagetrennt)</label>
      <input id="newCourseTimes">

      <label>Kursbild hochladen</label>
      <input type="file" id="newCourseImage">

      <button id="createCourse" class="btn primary" style="margin-top:12px;">
        Kurs erstellen
      </button>
    </div>

    <!-- KURS-BEARBEITUNG -->
    <div class="booking-form">
      <h3>Kurs bearbeiten</h3>

      <label>Kurs auswählen</label>
      <select id="courseSelect">
        <option value="">Bitte auswählen…</option>
      </select>

      <label>Titel</label>
      <input id="courseTitle">

      <label>Label im Formular</label>
      <input id="courseLabel">

      <label>Formular-Wert</label>
      <input id="courseFormValue">

      <label>Beschreibung</label>
      <textarea id="courseDescription"></textarea>

      <label>Preis</label>
      <input id="coursePrice">

      <label>Tag</label>
      <input id="courseDay" type="number" min="1" max="7">

      <label>Zeiten</label>
      <input id="courseTimes">

      <label>Neues Bild hochladen (optional)</label>
      <input type="file" id="courseImage">

      <img id="courseImagePreview" style="width:100%; margin-top:10px; border-radius:8px; display:none;">

      <button id="saveCourse" class="btn primary" style="margin-top:12px;">
        Kurs speichern
      </button>
      <button id="deleteCourse" class="btn secondary" style="margin-top:12px; background:#d9534f;">
       Kurs löschen
      </button>
    </div>

    <!-- ZEITEN SPERREN -->
    <div class="booking-form">
      <h3>Zeiten sperren</h3>

      <label>Datum wählen</label>
      <input type="date" id="adminDate">

      <div id="timeList" class="cards" style="margin-top:16px;"></div>

      <button id="clearAll" class="btn secondary" style="margin-top:16px;">
        Alle Sperrungen löschen
      </button>
    </div>

    <!-- GESPERRTE ZEITEN -->
    <div class="booking-form">
      <h3>Gesperrte Zeiten</h3>
      <ul id="blockedList" style="list-style:none; padding-left:0;"></ul>

      <hr style="margin:18px 0; border:none; border-top:1px solid #ccc;">

      <button id="logoutBtn" class="btn secondary">Logout</button>
    </div>

  </div>
</section>

<script>
/* STARTSEITE */
async function loadHomepage() {
  const snap = await db.collection("settings").doc("homepage").get();
  if (!snap.exists) return;

  const d = snap.data();
  heroTitle.value = d.heroTitle || "";
  heroSubtitle.value = d.heroSubtitle || "";
  seoText.value = d.seoText || "";
}

saveHomepage.onclick = async () => {
  await db.collection("settings").doc("homepage").set({
    heroTitle: heroTitle.value,
    heroSubtitle: heroSubtitle.value,
    seoText: seoText.value
  }, { merge: true });

  alert("Startseite gespeichert.");
};

loadHomepage();

/* KURS-ERSTELLUNG */
createCourse.onclick = async () => {
  const id = newCourseId.value.trim();
  if (!id) return alert("Bitte Kurs-ID eingeben.");

  let imagePath = "";

  const file = newCourseImage.files[0];
  if (file) {
    const ref = storage.ref(`courses/${id}.jpg`);
    await ref.put(file);
    imagePath = `courses/${id}.jpg`;
  }

  await db.collection("courses").doc(id).set({
    title: newCourseTitle.value,
    label: newCourseLabel.value,
    formValue: newCourseFormValue.value,
    description: newCourseDescription.value,
    price: newCoursePrice.value,
    day: parseInt(newCourseDay.value),
    times: newCourseTimes.value.split(",").map(t => t.trim()),
    image: imagePath
  });

  alert("Kurs erstellt.");
  loadCourseList();
};

/* KURS-LISTE LADEN */
async function loadCourseList() {
  const select = document.getElementById("courseSelect");
  select.innerHTML = '<option value="">Bitte auswählen…</option>';

  const snap = await db.collection("courses").get();
  snap.forEach(doc => {
    const opt = document.createElement("option");
    opt.value = doc.id;
    opt.textContent = doc.data().title;
    select.appendChild(opt);
  });
}

loadCourseList();

/* KURS LADEN */
courseSelect.onchange = async () => {
  const id = courseSelect.value;
  if (!id) return;

  const snap = await db.collection("courses").doc(id).get();
  const c = snap.data();

  courseTitle.value = c.title;
  courseLabel.value = c.label;
  courseFormValue.value = c.formValue;
  courseDescription.value = c.description;
  coursePrice.value = c.price;
  courseDay.value = c.day;
  courseTimes.value = c.times.join(",");

  if (c.image) {
    const url = await storage.ref(c.image).getDownloadURL();
    courseImagePreview.src = url;
    courseImagePreview.style.display = "block";
  }
};

/* KURS SPEICHERN */
saveCourse.onclick = async () => {
  const id = courseSelect.value;
  if (!id) return alert("Bitte Kurs auswählen.");

  let imagePath = null;

  const file = courseImage.files[0];
  if (file) {
    const ref = storage.ref(`courses/${id}.jpg`);
    await ref.put(file);
    imagePath = `courses/${id}.jpg`;
  }

  const update = {
    title: courseTitle.value,
    label: courseLabel.value,
    formValue: courseFormValue.value,
    description: courseDescription.value,
    price: coursePrice.value,
    day: parseInt(courseDay.value),
    times: courseTimes.value.split(",").map(t => t.trim())
  };

  if (imagePath) update.image = imagePath;

  await db.collection("courses").doc(id).set(update, { merge: true });

  alert("Kurs gespeichert.");
};

/* LOGOUT */
logoutBtn.onclick = () => {
  localStorage.removeItem("adminLoggedIn");
  window.location.href = "login.html";
};
</script>

<script src="admin.js?v=2001"></script>

</body>
</html>
